name: Deploy to Hostinger

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Liva Media Kreatif
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            # Ganti 'public_html' menjadi 'nodejs' jika Anda memisahkan foldernya di Hostinger
            cd /home/u287082095/domains/system.livaagency.com/public_html
            
            echo "1. Menarik kode terbaru..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            echo "2. Instal dependensi baru..."
            npm ci
            
            echo "3. Jalankan quality gate production..."
            npm run check:prod

            echo "4. Menjalankan migrasi database..."
            npm run migrate
            
            echo "5. Restart PM2 Server..."
            pm2 restart all
