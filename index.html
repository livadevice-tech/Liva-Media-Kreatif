<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Liva Agency - Solusi Live Shopping & Digital Marketing</title>
    <meta name="description" content="Liva Agency adalah agensi manajemen Live Shopping terdepan. Tingkatkan omzet Tiktok, Shopee, dan Tokopedia Anda dengan Host profesional, studio, dan strategi marketing kami." />
    <meta name="keywords" content="Liva Agency, Live Shopping, Tiktok Shop, Shopee Live, Tokopedia Play, Digital Marketing, Agensi Live Stream" />
    
    <!-- Open Graph for Social Media -->
    <meta property="og:title" content="Liva Agency - Solusi Live Shopping Terbaik" />
    <meta property="og:description" content="Tingkatkan omzet Live Shopping Anda dengan Liva Agency. Kami siapkan Host, Studio, dan Strategi!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://liva-agency.com/landing-page/website-new.png" />
    
    <!-- Preload Critical Assets for LCP -->
    <link rel="preload" href="/landing-page/bg-header.png" as="image" fetchpriority="high">
    <link rel="preload" href="/landing-page/website-new.png" as="image" fetchpriority="high">
    
    <!-- Google Fonts: Roboto (Primary) & Plus Jakarta Sans (Secondary/Heading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <!-- JSON-LD Schema Markup for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Liva Agency",
      "image": "https://liva-agency.com/landing-page/website-new.png",
      "description": "Liva Agency adalah agensi manajemen Live Shopping terdepan untuk TikTok Shop, Shopee Live, dan Tokopedia Play.",
      "url": "https://liva-agency.com",
      "telephone": "+6281234567890",
      "sameAs": [
        "https://www.instagram.com/liva_agency",
        "https://www.tiktok.com/@liva_agency"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Jakarta",
        "addressCountry": "ID"
      },
      "priceRange": "$$"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
