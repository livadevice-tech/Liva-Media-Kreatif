name: Deploy to Hostinger

on:
  push:
    branches:
      - feature/mysql-migration
      - mysql-migration

jobs:
  deploy:
    name: Deploy Liva Media Kreatif
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            # Arahkan ke folder project di server Hostinger
            # SESUAIKAN JIKA NAMA FOLDERNYA BERBEDA
            cd /path/ke/folder/liva-app
            
            echo "1. Menarik kode terbaru..."
            git pull origin feature/mysql-migration
            
            echo "2. Instal dependensi baru..."
            npm install --production=false
            
            echo "3. Migrasi struktur Database..."
            npm run migrate
            
            echo "4. Build Frontend dan Backend..."
            npm run build
            
            echo "5. Restart Server Node.js (via PM2)..."
            # Asumsi nama aplikasi di PM2 adalah liva-backend
            pm2 reload liva-backend --update-env || pm2 start dist/server.cjs --name "liva-backend"
            
            echo "✅ Deployment Selesai!"
