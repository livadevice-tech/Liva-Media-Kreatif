name: Deploy to Hostinger

on:
  push:
    branches:
      - feature/mysql-migration
      - mysql-migration

jobs:
  deploy:
    name: Deploy Liva Media Kreatif
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            # Ganti 'public_html' menjadi 'nodejs' jika Anda memisahkan foldernya di Hostinger
            cd /home/u287082095/domains/system.livaagency.com/public_html
            
            echo "1. Menarik kode terbaru..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            echo "2. Instal dependensi baru..."
            npm ci || npm install --production=false
            
            echo "3. Menjalankan migrasi database otomatis..."
            npm run migrate
            
            echo "4. Build ulang frontend..."
            npm run build
            
            echo "5. Restart PM2 Server..."
            pm2 restart all
